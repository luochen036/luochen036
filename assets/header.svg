<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08111F"/>
      <stop offset="0.36" stop-color="#0B2A5B"/>
      <stop offset="0.7" stop-color="#115E96"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(250 70) rotate(34) scale(360 160)">
      <stop stop-color="#93C5FD" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#93C5FD" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(930 290) rotate(-18) scale(390 190)">
      <stop stop-color="#22D3EE" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="250" y1="252" x2="950" y2="252" gradientUnits="userSpaceOnUse">
      <stop stop-color="#93C5FD" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#DBEAFE"/>
      <stop offset="1" stop-color="#93C5FD" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <clipPath id="typingClip">
      <rect x="0" y="0" width="0" height="46">
        <animate attributeName="width" values="0;650;650;0" keyTimes="0;0.58;0.84;1" dur="5.8s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <rect width="1200" height="360" rx="30" fill="url(#card)" filter="url(#softShadow)"/>
  <rect width="1200" height="360" rx="30" fill="url(#glowA)"/>
  <rect width="1200" height="360" rx="30" fill="url(#glowB)"/>
  <rect x="24" y="24" width="1152" height="312" rx="24" fill="#FFFFFF" fill-opacity="0.055" stroke="#BFDBFE" stroke-opacity="0.22"/>
  <path d="M120 88C250 22 363 42 484 94C618 152 706 134 822 84C940 34 1046 54 1110 92" stroke="#BAE6FD" stroke-opacity="0.2" stroke-width="2"/>
  <path d="M150 292C300 236 424 244 560 282C690 318 790 306 918 254C1035 206 1100 228 1142 254" stroke="#E0F2FE" stroke-opacity="0.16" stroke-width="2"/>

  <text x="600" y="120" text-anchor="middle" fill="#F8FAFC" font-size="54" font-weight="700" font-family="'Noto Sans SC','Microsoft YaHei','PingFang SC',Arial,sans-serif">
    你好，我是洛尘
  </text>

  <text x="600" y="170" text-anchor="middle" fill="#DBEAFE" font-size="23" font-weight="500" font-family="'Noto Sans SC','Microsoft YaHei','PingFang SC',Arial,sans-serif">
    欢迎来到我的 GitHub 主页
  </text>

  <rect x="250" y="205" width="700" height="72" rx="16" fill="#020617" fill-opacity="0.32" stroke="#93C5FD" stroke-opacity="0.2"/>
  <line x1="250" y1="291" x2="950" y2="291" stroke="url(#line)" stroke-width="1.5"/>

  <g transform="translate(305 219)">
    <g clip-path="url(#typingClip)">
      <text x="0" y="34" fill="#E0F2FE" font-size="28" font-weight="600" font-family="'Noto Sans SC','Microsoft YaHei','PingFang SC',Arial,sans-serif">
        记录学习，持续构建，把想法做成可用的作品
      </text>
    </g>
    <rect x="0" y="4" width="3" height="38" rx="1.5" fill="#E0F2FE">
      <animate attributeName="x" values="0;650;650;0" keyTimes="0;0.58;0.84;1" dur="5.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;1;0.15;1" dur="0.9s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
